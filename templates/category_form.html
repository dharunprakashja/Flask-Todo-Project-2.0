    {% extends 'base.html' %}
    {% block content %}

    <style>

    .page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .box {
        text-align: center;
    }

    form {
        margin-top: 15px;
        box-shadow: 0px 2px 6px black;
        padding: 25px;
        border-radius: 10px;
        width: 300px;
    }


    input {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid grey;
        margin-bottom: 15px;
    }

    add {
        margin-left: 10px;
        background: crimson;
        color: white;
        padding: 7px 15px;
        border-radius: 6px;
        text-decoration: none;
    }


    </style>

    <div class="page">

        <div class="box">

            <h2>Add Category</h2>

            <form method="POST">

                <label>Category</label>

                <input name="category" required>

                <button type="submit" style="background-color: green;padding: 10px;border-radius: 10px;color: white;cursor: pointer;border: none;">Add</button>

                <a href="{{ url_for('home') }}" style="background-color: red;padding: 8px;cursor: pointer;border-radius: 10px;text-decoration: none;color: white;">Back</a>

            </form>

        </div>

    </div>

    {% endblock %}
